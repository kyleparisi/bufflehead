name: Build Windows

# Builds the Windows .exe natively on a Windows runner. Cross-compiling from
# macOS fails in graphics.gd's tooling, so this is the supported path for
# producing Bufflehead.exe. Triggered manually (or by bin/release-exe).

on:
  workflow_dispatch:
  push:
    branches: [fix-windows-dll]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gd CLI
        run: go install graphics.gd/cmd/gd@release

      # Install Zig: its bundled LLVM lld lays out the PE correctly (handles
      # Go 1.25+ DWARF5) AND links go-duckdb's prebuilt lib, unlike the runner's
      # default/old gcc (malformed PE -> "Error 193: not a valid Win32
      # application", golang/go#75077, graphics.gd#224) or UCRT64 gcc 16
      # (undefined __emutls refs against the prebuilt libduckdb.a).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Per graphics.gd#224: on Windows, gd prefers its Zig toolchain (whose
      # LLVM linker handles Go 1.25+ DWARF5 correctly) ONLY when zig is on PATH
      # and CC is unset. The runner's default gcc is too old and yields a
      # malformed PE ("Error 193"). So: install zig, leave CC unset, let gd
      # drive the compile. This is the maintainer-confirmed working recipe.
      - name: Build Windows executable
        run: gd build ./cmd/viewer
        env:
          GOOS: windows

      # Diagnostic: show what the build actually produced in graphics/, with
      # sizes and the first bytes of every windows DLL (Godot's export renames
      # windows_amd64.dll during hot-reload, which may leave a non-PE file).
      - name: Diagnose DLL artifacts
        shell: pwsh
        run: |
          Get-ChildItem graphics -Filter "*windows*" -Force | Format-Table Name,Length,LastWriteTime -Auto
          Get-ChildItem graphics -Filter "*.dll" -Force | Format-Table Name,Length -Auto
          foreach ($f in Get-ChildItem graphics -Include "*.dll","~*" -Recurse -Force -ErrorAction SilentlyContinue) {
            $b = [System.IO.File]::ReadAllBytes($f.FullName)[0..1]
            $sig = -join ($b | ForEach-Object { [char]$_ })
            Write-Host ("{0,-30} {1,12} bytes  first2='{2}'" -f $f.Name, $f.Length, $sig)
          }

      # Fail loudly if the Go GDExtension DLL is malformed. A broken DLL makes
      # Godot export "succeed" but the app dies at launch with
      # "MainLoop type doesn't exist: GoMainLoop", so validate the PE here.
      - name: Verify Go DLL is a valid Windows PE
        shell: pwsh
        run: |
          $dll = "graphics/windows_amd64.dll"
          if (-not (Test-Path $dll)) { throw "DLL not found at $dll" }
          $bytes = [System.IO.File]::ReadAllBytes($dll)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { throw "DLL has no MZ header" }
          $peOff = [BitConverter]::ToInt32($bytes, 0x3C)
          if ($bytes[$peOff] -ne 0x50 -or $bytes[$peOff+1] -ne 0x45) { throw "DLL has no PE signature" }
          $machine = [BitConverter]::ToUInt16($bytes, $peOff + 4)
          if ($machine -ne 0x8664) { throw ("DLL machine is 0x{0:X} (expected 0x8664/amd64)" -f $machine) }
          # Definitive check: ask Windows to actually load it.
          $h = [Runtime.InteropServices.NativeLibrary]::Load((Resolve-Path $dll))
          Write-Host "DLL loaded successfully (handle $h) - valid Win32 amd64 PE"

      # Godot's modify_resources step silently skips icon/metadata embedding
      # when rcedit isn't configured, so embed them explicitly here. ImageMagick
      # is preinstalled on windows-latest; rcedit is fetched from its release.
      - name: Embed icon and metadata
        shell: pwsh
        run: |
          $exe = "releases/windows/amd64/Bufflehead.exe"

          # Build a multi-resolution .ico from the 1024px source PNG.
          magick graphics/icon-1024.png -define icon:auto-resize=256,128,64,48,32,16 graphics/icon.ico

          # Fetch rcedit.
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe

          ./rcedit.exe "$exe" `
            --set-icon graphics/icon.ico `
            --set-version-string "ProductName" "Bufflehead" `
            --set-version-string "FileDescription" "Bufflehead Parquet Viewer" `
            --set-version-string "CompanyName" "Bufflehead.app" `
            --set-version-string "LegalCopyright" "Copyright 2026 Bufflehead.app" `
            --set-file-version "0.20.0.0" `
            --set-product-version "0.20.0.0"

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: Bufflehead-windows-amd64
          path: releases/windows/amd64/Bufflehead.exe
          if-no-files-found: error
