name: Build Windows

# Builds the Windows bundle (exe + GDExtension DLL + MinGW runtime) and a
# one-click installer, natively on a Windows runner. The build logic lives in
# bin/build-windows so it can be run locally too (MSYS2 UCRT64), rather than
# being spread across GitHub Actions steps. Triggered manually (or by
# bin/release-exe).

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # UCRT64 + inherit so bin/build-windows can see Go, ImageMagick and
      # Inno Setup from the Windows PATH. The pinned gcc 14.2 prefix and pacman
      # deps are set up by the script itself.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit

      - name: Build Windows bundle + installer
        shell: msys2 {0}
        # Pin GDPATH so gd is not in "local toolchain" mode and will
        # auto-download the pinned Godot 4.6.1 editor + libgodot.
        #
        # AZURE_SIGN_* turn on Authenticode signing via Azure Artifact Signing.
        # The endpoint/account/profile are not secret; the service-principal
        # credentials are (repo secrets). If the AZURE_* secrets are absent the
        # build still succeeds — it just produces unsigned binaries.
        env:
          GDPATH: ${{ runner.temp }}/gd
          AZURE_SIGN_ENDPOINT: https://eus.codesigning.azure.net/
          AZURE_SIGN_ACCOUNT: bufflehead
          AZURE_SIGN_PROFILE: bufflehead
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: ./bin/build-windows

      - name: Upload Windows bundle (exe + GDExtension + runtime DLLs)
        uses: actions/upload-artifact@v7
        with:
          name: Bufflehead-windows-amd64
          path: releases/windows/amd64/
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Bufflehead-windows-installer
          path: installer/Bufflehead-Setup.exe
          if-no-files-found: error
