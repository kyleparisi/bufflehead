name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

  # Runs the Go unit tests natively on Windows so cross-platform behavior
  # (e.g. bookmark persistence under %AppData%) and the cgo/duckdb build are
  # verified there too. Uses the same MSYS2 UCRT64 + pinned gcc 14.2 toolchain
  # as the Windows release build (bin/build-windows).
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit

      # Cache the pinned gcc 14.2 side prefix so we don't reinstall it each run.
      - name: Cache gcc 14.2 prefix
        uses: actions/cache@v4
        with:
          path: C:\gcc142
          # Keyed on the toolchain script so any change to it rebuilds the prefix.
          key: windows-gcc142-${{ hashFiles('bin/setup-gcc142') }}

      - name: Run unit tests (Windows, cgo/duckdb)
        shell: msys2 {0}
        run: |
          source bin/setup-gcc142
          go test ./...
