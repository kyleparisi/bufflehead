name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gd CLI
        run: go install graphics.gd/cmd/gd@release

      - name: Run tests
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          ./bin/tests
